[general]
working_directory = "C:\\Users\\luism"
live_config_reload = true

[window]
dimensions = { columns = 120, lines = 30 }
position = "None"
padding = { x = 12, y = 12 }
decorations = "Full" #| "None"
opacity = 0.85
title = "Alacritty"
dynamic_title = false
decorations_theme_variant = "Dark"

[font]
normal = { family = "CaskaydiaCove Nerd Font", style = "Regular" }
bold = { family = "CaskaydiaCove Nerd Font", style = "Bold" }
italic = { family = "CaskaydiaCove Nerd Font", style = "Italic" }
bold_italic = { family = "CaskaydiaCove Nerd Font", style = "Bold Italic" }
size = 11
builtin_box_drawing = true

[colors.primary]
background = "#07070a"
foreground = "#ffffff"

[colors.cursor]
cursor = "#f3f4f6"
text = "#07070a"

[colors.normal]
red = "#ef4444"
green = "#22c55e"
yellow = "#eab308"
blue = "#3b82f6"
magenta = "#a855f7"
cyan = "#06b6d4"
white = "#ffffff"

[colors.bright]
red = "#fecaca"
green = "#bbf7d0"
yellow = "#fef08a"
blue = "#bfdbfe"
magenta = "#e9d5ff"
cyan = "#a5f3fc"
white = "#ffffff"

[bell]
animation = "EaseOutExpo"

[selection]
save_to_clipboard = true

[cursor]
style = { shape = "block", blinking = "Always" }
vi_mode_style = { shape = "block", blinking = "Always" }
blink_interval = 500
unfocused_hollow = false

[terminal.shell]
program = "C:\\msys64\\usr\\bin\\zsh.exe"
args = ["--login"]

[env]
WINIT_X11_SCALE_FACTOR = "1.0"
TERM = "xterm-256color"
MSYSTEM = "MSYS"
CHERE_INVOKING = "1"

[[keyboard.bindings]]
key = "V"
mods = "Control"
action = "Paste"

[[mouse.bindings]]
action = "Paste"
mouse = "Right"